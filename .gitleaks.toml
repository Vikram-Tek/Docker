title = "Strict CI Gitleaks Rules"

# DO NOT use a global allowlist while testing
# Comment it out entirely to guarantee detection
# [allowlist]

# ---------- AWS Secrets (guaranteed detection) ----------
[[rules]]
id = "aws-access-key"
description = "AWS Access Key ID"
regex = '''AKIA[0-9A-Z]{16}'''
severity = "CRITICAL"
tags = ["aws", "key"]

[[rules]]
id = "aws-secret-key"
description = "AWS Secret Access Key"
regex = '''(?i)aws(.{0,20})?(secret|access)?.{0,20}['"][0-9a-zA-Z/+]{40}['"]'''
severity = "CRITICAL"
tags = ["aws", "secret"]

# ---------- Generic Passwords ----------
[[rules]]
id = "generic-password"
description = "Hardcoded password"
regex = '''(?i)(password|passwd|pwd)\s*=\s*['"][^'"]{8,}['"]'''
severity = "CRITICAL"
tags = ["password"]

# ---------- Generic API Keys ----------
[[rules]]
id = "generic-api-key"
description = "Generic API key"
regex = '''(?i)(api_key|apikey|token)\s*=\s*['"][A-Za-z0-9_\-]{16,}['"]'''
severity = "CRITICAL"
tags = ["apikey"]
